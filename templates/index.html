<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wardrobe AI | Shwetank Singh Rajput</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="glass-card">
            <h1>Wardrobe AI</h1>
            <p class="subtitle">Premium Style Logic Engine</p>
            
            <div class="input-section">
                <div class="input-group">
                    <label>Skin Tone</label>
                    <select id="skin_tone">
                        <option>Warm</option>
                        <option>Cool</option>
                        <option>Neutral</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Occasion</label>
                    <select id="occasion">
                        <option>Casual</option>
                        <option>Formal</option>
                        <option>Date Night</option>
                        <option>Wedding</option>
                    </select>
                </div>
                <button onclick="generateLook()" id="gen-btn">Generate Analysis</button>
            </div>

            <div id="results" class="results-box" style="display:none;">
                <div class="score-container">
                    <div class="score-pill">Color: <span id="s-color"></span>/10</div>
                    <div class="score-pill">Weather: <span id="s-weather"></span>/10</div>
                    <div class="score-pill">Style: <span id="s-occ"></span>/10</div>
                </div>
                
                <div class="analysis-grid">
                    <div class="analysis-item">
                        <h3>✨ The Look</h3>
                        <p id="res-outfit"></p>
                    </div>
                    <div class="analysis-item">
                        <h3>🧠 Reasoning</h3>
                        <p id="res-why"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function generateLook() {
            const btn = document.getElementById('gen-btn');
            btn.innerText = "Analyzing Logic...";
            btn.disabled = true;
            
            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        skin_tone: document.getElementById('skin_tone').value,
                        occasion: document.getElementById('occasion').value
                    })
                });
                const data = await response.json();
                
                document.getElementById('results').style.display = 'block';
                document.getElementById('s-color').innerText = data.score_color || 0;
                document.getElementById('s-weather').innerText = data.score_weather || 0;
                document.getElementById('s-occ').innerText = data.score_occasion || 0;
                document.getElementById('res-outfit').innerText = data.outfit;
                document.getElementById('res-why').innerText = data.why;
            } catch (e) {
                alert("Error connecting to engine.");
            } finally {
                btn.innerText = "Generate Analysis";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
