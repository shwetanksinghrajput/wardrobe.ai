<!-- Replace the #ai-results div in your index.html with this updated version -->
<div id="ai-results">
    <div class="result-title">📊 Match Analysis</div>
    <div id="score-container" style="display: flex; gap: 10px; margin-bottom: 15px;">
        <!-- Scores will be injected here -->
    </div>

    <div class="result-title">👕 The Look</div>
    <div class="result-text" id="res-outfit"></div>
    
    <div class="result-title">🎨 Palette</div>
    <div id="res-palette"></div>
    
    <div class="result-title">🧠 Strategic Reasoning</div>
    <div class="result-text" id="res-why"></div>
    
    <div class="result-title">🧴 Grooming & Care</div>
    <div class="result-text" id="res-grooming"></div>
</div>

<style>
    /* Add this to your CSS for the Score Pills */
    .score-pill {
        flex: 1;
        background: rgba(255, 255, 255, 0.6);
        padding: 10px;
        border-radius: 8px;
        text-align: center;
        border: 1px solid rgba(217, 122, 106, 0.2);
    }
    .score-val {
        display: block;
        font-size: 18px;
        font-weight: bold;
        color: #d97a6a;
    }
    .score-label {
        font-size: 9px;
        text-transform: uppercase;
        color: #9a908d;
    }
</style>

<script>
// Update your generateOutfit() function's "success" block:
if (data.error) {
    alert(data.error);
} else {
    // Inject Scores
    const scoreContainer = document.getElementById('score-container');
    scoreContainer.innerHTML = `
        <div class="score-pill"><span class="score-val">${data.scores.color_harmony}/10</span><span class="score-label">Color</span></div>
        <div class="score-pill"><span class="score-val">${data.scores.weather_suitability}/10</span><span class="score-label">Weather</span></div>
        <div class="score-pill"><span class="score-val">${data.scores.occasion_fit}/10</span><span class="score-label">Occasion</span></div>
    `;

    document.getElementById('res-outfit').innerText = data.best_outfit;
    document.getElementById('res-why').innerText = data.why_it_works;
    document.getElementById('res-grooming').innerText = `${data.perfume} | ${data.skincare_tip}`;
    
    // Palette logic (same as before)
    const paletteContainer = document.getElementById('res-palette');
    paletteContainer.innerHTML = ""; 
    data.color_palette.forEach(color => {
        const circle = document.createElement('div');
        circle.className = 'color-circle';
        circle.style.backgroundColor = color;
        paletteContainer.appendChild(circle);
    });
    
    resultsBox.style.display = "block";
}
</script>
